# .autoc-project.yaml — 项目级配置（类似 Ralph 的 .ralphrc）
#
# 将此文件复制到项目工作区根目录并重命名为 .autoc-project.yaml
# 可覆盖全局 config.yaml 中的任意配置项
#
# 优先级: .autoc-project.yaml > config.yaml > 环境变量

# LLM 配置覆盖
llm:
  preset: glm
  model: glm-5
  timeout: 300

# Agent 配置覆盖
agents:
  planner:
    max_iterations: 8
  coder:
    max_iterations: 50
  tester:
    max_iterations: 10

# 编排配置覆盖
orchestrator:
  max_rounds: 5

# 特性开关
features:
  parallel: true
  git: true
  progress_tracking: true
